- name: Install Ansible
  apt:
    name:
      - ansible
      - python3
    state: present
    update_cache: yes

- name: Install dependencies
  apt:
    name:
      - curl
      - gnupg
      - apt-transport-https
    state: present
    update_cache: yes

- name: Create keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Add Kubernetes apt key
  shell: |
    curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.36/deb/Release.key | gpg --dearmor > /etc/apt/keyrings/kubernetes-apt-keyring.gpg
  args:
    creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg

- name: Add Kubernetes apt repository
  apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.36/deb/ /"
    state: present
    filename: kubernetes

- name: Install kubectl
  apt:
    name: kubectl
    state: present
    update_cache: yes

- name: Check if kubeconform is installed
  stat:
    path: /usr/local/bin/kubeconform
  register: kubeconform_installed

- name: Install kubeconform
  shell: |
    curl -L https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar xz -C /tmp
    mv /tmp/kubeconform /usr/local/bin/
  when: not kubeconform_installed.stat.exists

- name: Create runner user
  user:
    name: runner
    system: yes
    shell: /bin/bash
    home: /home/runner

- name: Create runner directories
  file:
    path: "{{ item.dir }}"
    state: directory
    owner: runner
    group: runner
    mode: '0755'
  loop: "{{ runners }}"

- name: Check if runner is already installed
  stat:
    path: "{{ item.dir }}/run.sh"
  register: runner_installed
  loop: "{{ runners }}"

- name: Download GitHub Actions Runner
  get_url:
    url: "https://github.com/actions/runner/releases/download/v{{ runner_version }}/actions-runner-linux-x64-{{ runner_version }}.tar.gz"
    dest: /tmp/actions-runner.tar.gz
    mode: '0644'
  when: not runner_installed.results | map(attribute='stat.exists') | min

- name: Extract GitHub Actions Runner
  unarchive:
    src: /tmp/actions-runner.tar.gz
    dest: "{{ item.item.dir }}"
    remote_src: yes
    owner: runner
    group: runner
  loop: "{{ runner_installed.results }}"
  when: not item.stat.exists

- name: Configure GitHub Actions Runner
  shell: |
    ./config.sh --url {{ item.item.repo }} --token {{ item.item.token }} --name {{ item.item.name }} --unattended --replace
  args:
    chdir: "{{ item.item.dir }}"
  become_user: runner
  loop: "{{ runner_installed.results }}"
  when: not item.stat.exists

- name: Install runner as systemd service
  shell: ./svc.sh install runner
  args:
    chdir: "{{ item.dir }}"
    creates: "/etc/systemd/system/actions.runner.gigan0815-{{ item.repo | basename }}.{{ item.name }}.service"
  loop: "{{ runners }}"

- name: Start runner services
  shell: ./svc.sh start
  args:
    chdir: "{{ item.dir }}"
  loop: "{{ runners }}"
