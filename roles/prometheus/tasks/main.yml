- name: Check if Prometheus is already installed
  stat:
    path: "{{ prometheus_bin }}"
  register: prometheus_installed

- name: Download Prometheus
  get_url:
    url: "{{ prometheus_url }}"
    dest: /tmp/prometheus.tar.gz
    mode: '0644'
  when: not prometheus_installed.stat.exists

- name: Extract Prometheus
  unarchive:
    src: /tmp/prometheus.tar.gz
    dest: /tmp/
    remote_src: yes
  when: not prometheus_installed.stat.exists

- name: Install Prometheus binary
  copy:
    src: "/tmp/prometheus-{{ prometheus_version }}.linux-amd64/prometheus"
    dest: "{{ prometheus_bin }}"
    mode: '0755'
    remote_src: yes
  when: not prometheus_installed.stat.exists

- name: Create Prometheus config directory
  file:
    path: /etc/prometheus
    state: directory

- name: Create Prometheus data directory
  file:
    path: "{{ prometheus_data }}"
    state: directory

- name: Deploy Prometheus configuration
  template:
    src: prometheus.yml.j2
    dest: "{{ prometheus_config }}"
    mode: '0644'

- name: Deploy Prometheus systemd service
  template:
    src: prometheus.service.j2
    dest: /etc/systemd/system/prometheus.service
    mode: '0644'

- name: Enable and start Prometheus
  systemd:
    name: prometheus
    enabled: yes
    state: started
    daemon_reload: yes
